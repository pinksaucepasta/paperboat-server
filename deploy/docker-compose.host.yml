services:
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: "no"
    environment:
      PAPERBOAT_ENV: production
      PAPERBOAT_FAKE_PROVIDERS: "false"
      PAPERBOAT_HTTP_ADDRESS: 0.0.0.0:8080
      PAPERBOAT_CATALOG_SEED_FILE: /app/config/catalogs.local.json
      PAPERBOAT_PUBLIC_BASE_URL: https://pb.hexwagon.com
      PAPERBOAT_ALLOWED_ORIGINS: https://paperboat-dashboard-omega.vercel.app
      PAPERBOAT_DATABASE_DSN: ${PAPERBOAT_DATABASE_DSN:?set PAPERBOAT_DATABASE_DSN}
      PAPERBOAT_WORKOS_BASE_URL: ${PAPERBOAT_WORKOS_BASE_URL:?set PAPERBOAT_WORKOS_BASE_URL}
      PAPERBOAT_WORKOS_CLIENT_ID: ${PAPERBOAT_WORKOS_CLIENT_ID:?set PAPERBOAT_WORKOS_CLIENT_ID}
      PAPERBOAT_WORKOS_API_KEY: ${PAPERBOAT_WORKOS_API_KEY:?set PAPERBOAT_WORKOS_API_KEY}
      PAPERBOAT_WORKOS_CLIENT_SECRET: ${PAPERBOAT_WORKOS_CLIENT_SECRET:?set PAPERBOAT_WORKOS_CLIENT_SECRET}
      PAPERBOAT_POLAR_BASE_URL: ${PAPERBOAT_POLAR_BASE_URL:?set PAPERBOAT_POLAR_BASE_URL}
      PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS: ${PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS:-300}
      PAPERBOAT_POLAR_API_KEY: ${PAPERBOAT_POLAR_API_KEY:?set PAPERBOAT_POLAR_API_KEY}
      PAPERBOAT_POLAR_WEBHOOK_SECRET: ${PAPERBOAT_POLAR_WEBHOOK_SECRET:?set PAPERBOAT_POLAR_WEBHOOK_SECRET}
      PAPERBOAT_FLY_API_TOKEN: ${PAPERBOAT_FLY_API_TOKEN:?set PAPERBOAT_FLY_API_TOKEN}
      PAPERBOAT_FLY_ORG_SLUG: ${PAPERBOAT_FLY_ORG_SLUG:?set PAPERBOAT_FLY_ORG_SLUG}
      PAPERBOAT_FLY_APP_NAME: ${PAPERBOAT_FLY_APP_NAME:?set PAPERBOAT_FLY_APP_NAME}
      PAPERBOAT_FLY_IMAGE_REF: ${PAPERBOAT_FLY_IMAGE_REF:?set PAPERBOAT_FLY_IMAGE_REF}
      PAPERBOAT_FLY_BOOT_COMMAND: ${PAPERBOAT_FLY_BOOT_COMMAND:-/usr/local/bin/paperboat-entrypoint}
      PAPERBOAT_AGENTUNNEL_BASE_URL: ${PAPERBOAT_AGENTUNNEL_BASE_URL:?set PAPERBOAT_AGENTUNNEL_BASE_URL}
      PAPERBOAT_AGENTUNNEL_API_KEY: ${PAPERBOAT_AGENTUNNEL_API_KEY:?set PAPERBOAT_AGENTUNNEL_API_KEY}
      PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN: ${PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN:-24h}
      PAPERBOAT_AGENTUNNEL_MACHINE_MODE: ${PAPERBOAT_AGENTUNNEL_MACHINE_MODE:-required}
      PAPERBOAT_AGENTUNNEL_PAPERCODE_LOCAL_URL: http://127.0.0.1:4099
      PAPERBOAT_AGENTUNNEL_ROUTE_SUBDOMAIN_PREFIX: pb
      PAPERBOAT_GITHUB_CLIENT_ID: ${PAPERBOAT_GITHUB_CLIENT_ID:?set PAPERBOAT_GITHUB_CLIENT_ID}
      PAPERBOAT_GITHUB_CLIENT_SECRET: ${PAPERBOAT_GITHUB_CLIENT_SECRET:?set PAPERBOAT_GITHUB_CLIENT_SECRET}
      PAPERBOAT_MINT_ACTIVE_KEY_ID: ${PAPERBOAT_MINT_ACTIVE_KEY_ID:?set PAPERBOAT_MINT_ACTIVE_KEY_ID}
      PAPERBOAT_MINT_SIGNING_KEYS: ${PAPERBOAT_MINT_SIGNING_KEYS:?set PAPERBOAT_MINT_SIGNING_KEYS}
      PAPERBOAT_SESSION_KEYS: ${PAPERBOAT_SESSION_KEYS:?set PAPERBOAT_SESSION_KEYS}
      PAPERBOAT_ENCRYPTION_KEY: ${PAPERBOAT_ENCRYPTION_KEY:?set PAPERBOAT_ENCRYPTION_KEY}
    volumes:
      - ../config/catalogs.example.json:/app/config/catalogs.local.json:ro
      - ../deploy/config.production.json:/app/config.production.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/usr/local/bin/paperboat-server", "migrate", "-config", "/app/config.production.json"]
    networks:
      - agentunnel-public

  seed-catalogs:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PAPERBOAT_ENV: production
      PAPERBOAT_FAKE_PROVIDERS: "false"
      PAPERBOAT_HTTP_ADDRESS: 0.0.0.0:8080
      PAPERBOAT_CATALOG_SEED_FILE: /app/config/catalogs.local.json
      PAPERBOAT_PUBLIC_BASE_URL: https://pb.hexwagon.com
      PAPERBOAT_ALLOWED_ORIGINS: https://paperboat-dashboard-omega.vercel.app
      PAPERBOAT_DATABASE_DSN: ${PAPERBOAT_DATABASE_DSN:?set PAPERBOAT_DATABASE_DSN}
      PAPERBOAT_WORKOS_BASE_URL: ${PAPERBOAT_WORKOS_BASE_URL:?set PAPERBOAT_WORKOS_BASE_URL}
      PAPERBOAT_WORKOS_CLIENT_ID: ${PAPERBOAT_WORKOS_CLIENT_ID:?set PAPERBOAT_WORKOS_CLIENT_ID}
      PAPERBOAT_WORKOS_API_KEY: ${PAPERBOAT_WORKOS_API_KEY:?set PAPERBOAT_WORKOS_API_KEY}
      PAPERBOAT_WORKOS_CLIENT_SECRET: ${PAPERBOAT_WORKOS_CLIENT_SECRET:?set PAPERBOAT_WORKOS_CLIENT_SECRET}
      PAPERBOAT_POLAR_BASE_URL: ${PAPERBOAT_POLAR_BASE_URL:?set PAPERBOAT_POLAR_BASE_URL}
      PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS: ${PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS:-300}
      PAPERBOAT_POLAR_API_KEY: ${PAPERBOAT_POLAR_API_KEY:?set PAPERBOAT_POLAR_API_KEY}
      PAPERBOAT_POLAR_WEBHOOK_SECRET: ${PAPERBOAT_POLAR_WEBHOOK_SECRET:?set PAPERBOAT_POLAR_WEBHOOK_SECRET}
      PAPERBOAT_FLY_API_TOKEN: ${PAPERBOAT_FLY_API_TOKEN:?set PAPERBOAT_FLY_API_TOKEN}
      PAPERBOAT_FLY_ORG_SLUG: ${PAPERBOAT_FLY_ORG_SLUG:?set PAPERBOAT_FLY_ORG_SLUG}
      PAPERBOAT_FLY_APP_NAME: ${PAPERBOAT_FLY_APP_NAME:?set PAPERBOAT_FLY_APP_NAME}
      PAPERBOAT_FLY_IMAGE_REF: ${PAPERBOAT_FLY_IMAGE_REF:?set PAPERBOAT_FLY_IMAGE_REF}
      PAPERBOAT_FLY_BOOT_COMMAND: ${PAPERBOAT_FLY_BOOT_COMMAND:-/usr/local/bin/paperboat-entrypoint}
      PAPERBOAT_AGENTUNNEL_BASE_URL: ${PAPERBOAT_AGENTUNNEL_BASE_URL:?set PAPERBOAT_AGENTUNNEL_BASE_URL}
      PAPERBOAT_AGENTUNNEL_API_KEY: ${PAPERBOAT_AGENTUNNEL_API_KEY:?set PAPERBOAT_AGENTUNNEL_API_KEY}
      PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN: ${PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN:-24h}
      PAPERBOAT_AGENTUNNEL_MACHINE_MODE: ${PAPERBOAT_AGENTUNNEL_MACHINE_MODE:-required}
      PAPERBOAT_AGENTUNNEL_PAPERCODE_LOCAL_URL: http://127.0.0.1:4099
      PAPERBOAT_AGENTUNNEL_ROUTE_SUBDOMAIN_PREFIX: pb
      PAPERBOAT_GITHUB_CLIENT_ID: ${PAPERBOAT_GITHUB_CLIENT_ID:?set PAPERBOAT_GITHUB_CLIENT_ID}
      PAPERBOAT_GITHUB_CLIENT_SECRET: ${PAPERBOAT_GITHUB_CLIENT_SECRET:?set PAPERBOAT_GITHUB_CLIENT_SECRET}
      PAPERBOAT_MINT_ACTIVE_KEY_ID: ${PAPERBOAT_MINT_ACTIVE_KEY_ID:?set PAPERBOAT_MINT_ACTIVE_KEY_ID}
      PAPERBOAT_MINT_SIGNING_KEYS: ${PAPERBOAT_MINT_SIGNING_KEYS:?set PAPERBOAT_MINT_SIGNING_KEYS}
      PAPERBOAT_SESSION_KEYS: ${PAPERBOAT_SESSION_KEYS:?set PAPERBOAT_SESSION_KEYS}
      PAPERBOAT_ENCRYPTION_KEY: ${PAPERBOAT_ENCRYPTION_KEY:?set PAPERBOAT_ENCRYPTION_KEY}
    volumes:
      - ../config/catalogs.example.json:/app/config/catalogs.local.json:ro
      - ../deploy/config.production.json:/app/config.production.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/usr/local/bin/paperboat-server", "seed-catalogs", "-config", "/app/config.production.json"]
    networks:
      - agentunnel-public

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: paperboat-server
    restart: unless-stopped
    depends_on:
      seed-catalogs:
        condition: service_completed_successfully
    environment:
      PAPERBOAT_ENV: production
      PAPERBOAT_FAKE_PROVIDERS: "false"
      PAPERBOAT_HTTP_ADDRESS: 0.0.0.0:8080
      PAPERBOAT_CATALOG_SEED_FILE: /app/config/catalogs.local.json
      PAPERBOAT_PUBLIC_BASE_URL: https://pb.hexwagon.com
      PAPERBOAT_ALLOWED_ORIGINS: https://paperboat-dashboard-omega.vercel.app
      PAPERBOAT_DATABASE_DSN: ${PAPERBOAT_DATABASE_DSN:?set PAPERBOAT_DATABASE_DSN}
      PAPERBOAT_WORKOS_BASE_URL: ${PAPERBOAT_WORKOS_BASE_URL:?set PAPERBOAT_WORKOS_BASE_URL}
      PAPERBOAT_WORKOS_CLIENT_ID: ${PAPERBOAT_WORKOS_CLIENT_ID:?set PAPERBOAT_WORKOS_CLIENT_ID}
      PAPERBOAT_WORKOS_API_KEY: ${PAPERBOAT_WORKOS_API_KEY:?set PAPERBOAT_WORKOS_API_KEY}
      PAPERBOAT_WORKOS_CLIENT_SECRET: ${PAPERBOAT_WORKOS_CLIENT_SECRET:?set PAPERBOAT_WORKOS_CLIENT_SECRET}
      PAPERBOAT_POLAR_BASE_URL: ${PAPERBOAT_POLAR_BASE_URL:?set PAPERBOAT_POLAR_BASE_URL}
      PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS: ${PAPERBOAT_POLAR_WEBHOOK_TOLERANCE_SECONDS:-300}
      PAPERBOAT_POLAR_API_KEY: ${PAPERBOAT_POLAR_API_KEY:?set PAPERBOAT_POLAR_API_KEY}
      PAPERBOAT_POLAR_WEBHOOK_SECRET: ${PAPERBOAT_POLAR_WEBHOOK_SECRET:?set PAPERBOAT_POLAR_WEBHOOK_SECRET}
      PAPERBOAT_FLY_API_TOKEN: ${PAPERBOAT_FLY_API_TOKEN:?set PAPERBOAT_FLY_API_TOKEN}
      PAPERBOAT_FLY_ORG_SLUG: ${PAPERBOAT_FLY_ORG_SLUG:?set PAPERBOAT_FLY_ORG_SLUG}
      PAPERBOAT_FLY_APP_NAME: ${PAPERBOAT_FLY_APP_NAME:?set PAPERBOAT_FLY_APP_NAME}
      PAPERBOAT_FLY_IMAGE_REF: ${PAPERBOAT_FLY_IMAGE_REF:?set PAPERBOAT_FLY_IMAGE_REF}
      PAPERBOAT_FLY_BOOT_COMMAND: ${PAPERBOAT_FLY_BOOT_COMMAND:-/usr/local/bin/paperboat-entrypoint}
      PAPERBOAT_AGENTUNNEL_BASE_URL: ${PAPERBOAT_AGENTUNNEL_BASE_URL:?set PAPERBOAT_AGENTUNNEL_BASE_URL}
      PAPERBOAT_AGENTUNNEL_API_KEY: ${PAPERBOAT_AGENTUNNEL_API_KEY:?set PAPERBOAT_AGENTUNNEL_API_KEY}
      PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN: ${PAPERBOAT_AGENTUNNEL_ROUTE_EXPIRES_IN:-24h}
      PAPERBOAT_AGENTUNNEL_MACHINE_MODE: ${PAPERBOAT_AGENTUNNEL_MACHINE_MODE:-required}
      PAPERBOAT_AGENTUNNEL_PAPERCODE_LOCAL_URL: http://127.0.0.1:4099
      PAPERBOAT_AGENTUNNEL_ROUTE_SUBDOMAIN_PREFIX: pb
      PAPERBOAT_GITHUB_CLIENT_ID: ${PAPERBOAT_GITHUB_CLIENT_ID:?set PAPERBOAT_GITHUB_CLIENT_ID}
      PAPERBOAT_GITHUB_CLIENT_SECRET: ${PAPERBOAT_GITHUB_CLIENT_SECRET:?set PAPERBOAT_GITHUB_CLIENT_SECRET}
      PAPERBOAT_MINT_ACTIVE_KEY_ID: ${PAPERBOAT_MINT_ACTIVE_KEY_ID:?set PAPERBOAT_MINT_ACTIVE_KEY_ID}
      PAPERBOAT_MINT_SIGNING_KEYS: ${PAPERBOAT_MINT_SIGNING_KEYS:?set PAPERBOAT_MINT_SIGNING_KEYS}
      PAPERBOAT_SESSION_KEYS: ${PAPERBOAT_SESSION_KEYS:?set PAPERBOAT_SESSION_KEYS}
      PAPERBOAT_ENCRYPTION_KEY: ${PAPERBOAT_ENCRYPTION_KEY:?set PAPERBOAT_ENCRYPTION_KEY}
    volumes:
      - ../config/catalogs.example.json:/app/config/catalogs.local.json:ro
      - ../deploy/config.production.json:/app/config.production.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8080"
    command: ["/usr/local/bin/paperboat-server", "serve", "-config", "/app/config.production.json"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      agentunnel-public:
        aliases:
          - paperboat-server

networks:
  agentunnel-public:
    external: true
    name: deploy_default
