# Hot-reload configuration for local Paperboat Server development.
# Start it with `make dev`; the target loads .env.local before invoking Air.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/paperboat-server ./cmd/paperboat-server"
  entrypoint = ["./tmp/paperboat-server", "serve"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", ".git", "node_modules"]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true

[misc]
  clean_on_exit = true
